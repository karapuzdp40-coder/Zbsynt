name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Publish APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Update releases APK on main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: cp app/build/outputs/apk/debug/app-debug.apk releases/app-debug.apk

      - name: Commit updated APK
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases/app-debug.apk
          git diff --staged --quiet || git commit -m "ci: update app-debug.apk"
          git push
